<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso - Sistema Electoral ⚖️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex-center">
    <div class="card-auth" >
        <h2 style="margin-top:0">Acceder</h2>
        <form id="login-form" style="width: 100%;">
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" id="user" required placeholder="Tu usuario">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="pass" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="background:#1d4ed8; color:white; padding:12px; border:none; border-radius:8px; width:100%; cursor:pointer; font-weight:bold;">
                Ingresar
            </button>
        </form>
        <p style="margin-top:1.5rem; font-size:0.85rem; color:#64748b">
            ¿No tienes cuenta? <a href="registro.html" style="color:#1d4ed8; font-weight:bold; text-decoration:none">Regístrate aquí</a>
        </p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Datos ingresados //
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            // Base de datos o admin por defecto //
            const db = JSON.parse(localStorage.getItem('usuarios_db')) || [{nombre:'admin', pass:'1234', rol:'admin'}];
            // Busca coincidencia //
            const find = db.find(x => x.nombre === u && x.pass === p);
       
            if(find) {
                localStorage.setItem('sesion_activa', JSON.stringify(find));
                window.location.href = 'index.html';
            } else alert("Datos incorrectos");
        });
    </script>
</body>
</html>
