<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PEN - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex-center">
    <div class="card-auth">
        <h2>Crear Cuenta</h2>
        <form id="registro-form">
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" id="reg-nombre" required>
            </div>
                <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="reg-pass" required>
            </div>
            <button type="submit" class="btn-primary">Registrarse</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>

    <script>
         // Evento al enviar formulario //
        document.getElementById('registro-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const nombre = document.getElementById('reg-nombre').value.trim();
            const pass = document.getElementById('reg-pass').value;

            let usuarios = JSON.parse(localStorage.getItem('usuarios_db')) || [];
            // Verifica duplicado //
            if (usuarios.find(u => u.nombre.toLowerCase() === nombre.toLowerCase())) {
                alert("El usuario ya existe.");
                return;
            }

             // Guarda usuario nuevo //
            usuarios.push({ nombre, pass, rol: 'user'});
            localStorage.setItem('usuarios_db', JSON.stringify(usuarios));
            alert("¡Registro exitoso!");
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
